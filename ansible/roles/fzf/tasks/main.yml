---
- name: Clone fzf repository
  ansible.builtin.git:
    repo: "https://github.com/junegunn/fzf.git"
    dest: "{{ local_dir }}/fzf"
    depth: 1
    update: true

- name: Run fzf install script
  ansible.builtin.command:
    cmd: "{{ local_dir }}/fzf/install --key-bindings --completion --no-update-rc"
  changed_when: true
