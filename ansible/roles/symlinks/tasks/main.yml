---
- name: Ensure ~/.config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config"
    state: directory
    mode: "0755"

- name: Ensure ~/.local directory exists
  ansible.builtin.file:
    path: "{{ local_dir }}"
    state: directory
    mode: "0755"

- name: Set default shell to zsh
  become: true
  ansible.builtin.user:
    name: "{{ ansible_env.USER }}"
    shell: /bin/zsh

- name: Link nvim config
  ansible.builtin.file:
    src: "{{ dotfiles_dir }}/nvim"
    dest: "{{ ansible_env.HOME }}/.config/nvim"
    state: link
    force: true

- name: Touch nvim/update marker
  ansible.builtin.file:
    path: "{{ dotfiles_dir }}/nvim/update"
    state: touch
    mode: "0644"

- name: Link dotfiles
  ansible.builtin.file:
    src: "{{ dotfiles_dir }}/{{ item.src }}"
    dest: "{{ ansible_env.HOME }}/{{ item.dest }}"
    state: link
    force: true
  loop:
    - { src: ".profile",         dest: ".profile" }
    - { src: ".zshrc",           dest: ".zshrc" }
    - { src: ".vimrc",           dest: ".vimrc" }
    - { src: ".tmux.conf",       dest: ".tmux.conf" }
    - { src: ".spaceshiprc.zsh", dest: ".spaceshiprc.zsh" }

- name: Link .amethyst.yml (macOS only)
  ansible.builtin.file:
    src: "{{ dotfiles_dir }}/.amethyst.yml"
    dest: "{{ ansible_env.HOME }}/.amethyst.yml"
    state: link
    force: true
  when: ansible_facts['os_family'] == "Darwin"
